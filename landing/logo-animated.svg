<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0" result="blur">
        <animate attributeName="stdDeviation" values="0;3;0" dur="1.8s" begin="1s" fill="freeze"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .stem {
      transform-origin: 37px 74px;
      opacity: 0;
      animation: riseUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.05s forwards;
    }
    .bowl {
      transform-origin: 30px 41px;
      opacity: 0;
      animation: swingIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) 0.35s forwards;
    }
    .check {
      stroke-dasharray: 34;
      stroke-dashoffset: 34;
      opacity: 0;
      animation: carve 0.4s ease-out 0.85s forwards;
    }
    @keyframes riseUp {
      from { opacity: 0; transform: scaleY(0); }
      to   { opacity: 1; transform: scaleY(1); }
    }
    @keyframes swingIn {
      from { opacity: 0; transform: scale(0.4) rotate(-25deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    @keyframes carve {
      from { opacity: 1; stroke-dashoffset: 34; }
      to   { opacity: 1; stroke-dashoffset: 0; }
    }
  </style>

  <g filter="url(#glow)">
    <rect class="stem" x="30" y="26" width="14" height="48" rx="7" fill="#34d6a6"/>
    <rect class="bowl" x="30" y="26" width="40" height="30" rx="15" fill="#34d6a6"/>
    <path class="check" d="M46 42 L52 48 L64 32" fill="none" stroke="#0a1410" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
