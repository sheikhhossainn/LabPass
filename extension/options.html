<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LabPass Settings</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --bg: #000000;
      --surface: #0a0a0a;
      --border: #1f1f1f;
      --text: #ffffff;
      --text-muted: #a1a1aa;
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.25);
      --green: #10b981;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }

    h1 {
      font-size: 1.15rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    h1 .icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      object-fit: contain;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 600;
    }

    input, select {
      width: 100%;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: var(--radius);
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .btn-save {
      background: var(--text);
      color: #000000;
      box-shadow: 0 0 14px rgba(255, 255, 255, 0.1);
    }

    .btn-save:hover {
      background: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }

    .btn-reset {
      background: var(--surface);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-reset:hover {
      color: var(--text);
    }

    .toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--green);
      color: #042f2e;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 700;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>
  <h1><img src="icons/icon-48.png" alt="LabPass Logo" class="icon" /> LabPass Settings</h1>

  <div class="field">
    <label for="pc-id">PC Name / Lab Identifier</label>
    <input type="text" id="pc-id" placeholder="e.g. CSE-Lab-PC-05" maxlength="64" />
    <p class="hint">Shown to students when they scan the QR code.</p>
  </div>

  <div class="field">
    <label for="server-url">Server URL</label>
    <input type="url" id="server-url" placeholder="http://localhost:3001" />
    <p class="hint">The LabPass relay server address.</p>
  </div>

  <div class="field">
    <label for="idle-timeout">Auto-logout after idle (minutes)</label>
    <select id="idle-timeout">
      <option value="60" selected>1 hour (60 minutes)</option>
      <option value="120">2 hours (120 minutes)</option>
      <option value="180">3 hours (180 minutes)</option>
    </select>
    <p class="hint">Automatically clears the session when the PC is idle.</p>
  </div>

  <div class="actions">
    <button class="btn-reset" id="reset-btn">Reset</button>
    <button class="btn-save" id="save-btn">Save Settings</button>
  </div>

  <div class="toast" id="toast">Settings saved ✓</div>

  <script src="options.js"></script>
</body>
</html>
